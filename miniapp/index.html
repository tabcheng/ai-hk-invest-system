<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI HK Invest — Mini App Preview Shell</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="/config.js"></script>
  </head>
  <body>
    <h1>AI HK Invest — Mini App Preview Shell</h1>
    <p>Phase 1 · Read-only · Paper trading only · Decision support only · no broker connection · no real-money execution</p>

    <section>
      <h2>最新系統運行</h2>
      <p id="latest-system-run-status">Loading...</p>
      <dl id="latest-system-run-fields"></dl>
    </section>
    <section>
      <h2>每日檢視摘要</h2>
      <p id="daily-review-summary-status">Loading...</p>
      <dl id="daily-review-summary-fields"></dl>
    </section>
    <section>
      <h2>信號摘要</h2>
      <p id="signals-summary-status">Loading...</p>
      <dl id="signals-summary-fields"></dl>
    </section>

    <section>
      <h2>安全與授權說明</h2>
      <ul>
        <li>validate Telegram initData server-side</li>
        <li>Do not trust initDataUnsafe</li>
      </ul>
    </section>

    <script>
      const LABELS = {
        business_date: "交易日",
        runner_status: "系統狀態",
        run_id: "運行編號",
        data_timestamp_hkt: "資料時間（香港時間）",
        updated_at_hkt: "更新時間（香港時間）",
        paper_trade_only: "交易模式",
        review_readiness: "檢視狀態",
        available_sections: "已有資料",
        unavailable_sections: "未有資料",
        boundary: "邊界說明",
        processed_tickers: "處理股票數",
        successful_tickers: "成功股票數",
        failed_tickers: "失敗股票數",
        shown_signals: "顯示信號數",
        covered_tickers: "覆蓋股票數",
        positive_signals: "正面模擬信號",
        neutral_signals: "觀望 / 中性信號",
        negative_signals: "負面模擬信號",
        unknown_signals: "未知信號",
        top_items: "重點股票",
        operator_note: "操作提示",
      };

      const VALUE_MAP = {
        status: { success: "成功", failed: "失敗", partial: "部分完成", unavailable: "暫時未有資料", unknown: "未知", ok: "成功" },
        runner_status: { success: "成功", failed: "失敗", partial: "部分完成", unknown: "未知" },
        paper_trade_only: { true: "只限模擬（Paper Trading）", false: "不符合模擬交易要求" },
        review_readiness: { ready: "已準備好", partial: "部分完成", unavailable: "暫時未有資料", unknown: "未知" },
        signal_label: { positive: "正面模擬信號", neutral: "觀望 / 中性信號", negative: "負面模擬信號", unknown: "未知信號" },
        confidence_label: { high: "較高", medium: "中等", low: "較低", unknown: "未知" },
      };


      const SECTION_NAME_MAP = {
        latest_system_run: "最新系統運行",
        daily_review_summary: "每日檢視摘要",
        signals: "信號摘要",
        paper_pnl: "模擬盈虧",
        risk: "風險摘要",
      };

      function resolveApiBaseUrl() {
        return String(window.MINIAPP_API_BASE_URL || "").trim().replace(/\/$/, "");
      }

      function mapSectionList(value) {
        if (Array.isArray(value)) {
          return value.map((item) => SECTION_NAME_MAP[String(item)] || String(item)).join("、");
        }
        return value;
      }

      function mapValue(key, value) {
        if (key === "available_sections" || key === "unavailable_sections") {
          return mapSectionList(value);
        }
        const keyMap = VALUE_MAP[key];
        if (keyMap && Object.prototype.hasOwnProperty.call(keyMap, String(value))) {
          return keyMap[String(value)];
        }
        return value;
      }

      function renderFields(elementId, orderedFields) {
        const fields = document.getElementById(elementId);
        fields.textContent = "";

        orderedFields.forEach(([key, value]) => {
          const dt = document.createElement("dt");
          dt.textContent = LABELS[key] || key;

          const dd = document.createElement("dd");
          dd.textContent = String(mapValue(key, value) ?? "");

          fields.appendChild(dt);
          fields.appendChild(dd);
        });
      }

      function renderSignalsTopItems(items) {
        if (!Array.isArray(items)) {
          return "";
        }

        return items
          .map((item) => {
            const ticker = String(item.ticker || "");
            const signalLabel = mapValue("signal_label", item.signal_label);
            const confidenceLabel = mapValue("confidence_label", item.confidence_label);
            const reason = String(item.reason_short || "").trim();
            return reason
              ? `${ticker} · ${signalLabel} · ${confidenceLabel} · ${reason}`
              : `${ticker} · ${signalLabel} · ${confidenceLabel}`;
          })
          .join("; ");
      }

      async function loadReviewShell() {
        const initData = (window.Telegram && window.Telegram.WebApp && window.Telegram.WebApp.initData) || "";
        const apiBaseUrl = resolveApiBaseUrl();
        const reviewShellUrl = `${apiBaseUrl}/miniapp/api/review-shell`;

        const latestStatusNode = document.getElementById("latest-system-run-status");
        const dailyStatusNode = document.getElementById("daily-review-summary-status");
        const signalsStatusNode = document.getElementById("signals-summary-status");

        try {
          const response = await fetch(reviewShellUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ init_data: initData }),
          });
          const payload = await response.json();

          const latest = payload?.sections?.latest_system_run;
          const daily = payload?.sections?.daily_review_summary;
          const signals = payload?.sections?.signals_summary;

          if (!latest || latest.status !== "ok") {
            latestStatusNode.textContent = latest?.reason || "最新系統運行暫時未有資料";
          } else {
            latestStatusNode.textContent = "最新系統運行已載入";
            renderFields("latest-system-run-fields", [
              ["business_date", latest.business_date],
              ["runner_status", latest.runner_status],
              ["run_id", latest.run_id],
              ["data_timestamp_hkt", latest.data_timestamp_hkt],
              ["updated_at_hkt", latest.updated_at_hkt],
              ["paper_trade_only", latest.paper_trade_only],
              ["processed_tickers", latest.processed_tickers],
              ["successful_tickers", latest.successful_tickers],
              ["failed_tickers", latest.failed_tickers],
              ["boundary", latest.boundary],
            ]);
          }

          if (!daily || daily.status !== "ok") {
            dailyStatusNode.textContent = daily?.reason || "每日檢視摘要暫時未有資料";
          } else {
            dailyStatusNode.textContent = "每日檢視摘要已載入";
            renderFields("daily-review-summary-fields", [
              ["business_date", daily.business_date],
              ["runner_status", daily.runner_status],
              ["run_id", daily.run_id],
              ["data_timestamp_hkt", daily.data_timestamp_hkt],
              ["updated_at_hkt", daily.updated_at_hkt],
              ["paper_trade_only", daily.paper_trade_only],
              ["review_readiness", daily.review_readiness],
              ["available_sections", daily.available_sections || []],
              ["unavailable_sections", daily.unavailable_sections || []],
              ["operator_note", daily.operator_note],
              ["boundary", daily.boundary],
            ]);
          }

          if (!signals || signals.status !== "ok") {
            signalsStatusNode.textContent = signals?.reason || "信號摘要暫時未有資料";
          } else {
            signalsStatusNode.textContent = "信號摘要已載入（只供模擬檢視，並非買賣指示）";
            renderFields("signals-summary-fields", [
              ["business_date", signals.business_date],
              ["run_id", signals.run_id],
              ["data_timestamp_hkt", signals.data_timestamp_hkt],
              ["updated_at_hkt", signals.updated_at_hkt],
              ["paper_trade_only", signals.paper_trade_only],
              ["review_readiness", signals.review_readiness],
              ["covered_tickers", signals.covered_tickers],
              ["shown_signals", signals.shown_signals],
              ["positive_signals", signals.positive_signals],
              ["neutral_signals", signals.neutral_signals],
              ["negative_signals", signals.negative_signals],
              ["unknown_signals", signals.unknown_signals],
              ["top_items", renderSignalsTopItems(signals.top_items)],
              ["operator_note", signals.operator_note],
              ["boundary", signals.boundary],
            ]);
          }
        } catch (_error) {
          latestStatusNode.textContent = "最新系統運行暫時未有資料";
          dailyStatusNode.textContent = "每日檢視摘要暫時未有資料";
          signalsStatusNode.textContent = "信號摘要暫時未有資料";
        }
      }

      loadReviewShell();
    </script>
  </body>
</html>
