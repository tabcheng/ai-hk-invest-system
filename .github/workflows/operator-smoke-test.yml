name: Operator Smoke Test

on:
  workflow_dispatch:
    inputs:
      target:
        description: Target environment label
        required: true
        default: production
      test_run_id:
        description: Enter only the numeric run id, e.g. 31
        required: true
      verify_supabase:
        description: Optional Supabase row verification for /decision_note persistence (default false)
        required: true
        default: "false"

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run operator smoke harness
        env:
          OPERATOR_WEBHOOK_TEST_URL: ${{ secrets.OPERATOR_WEBHOOK_TEST_URL }}
          OPERATOR_TEST_CHAT_ID: ${{ vars.OPERATOR_TEST_CHAT_ID }}
          OPERATOR_TEST_USER_ID: ${{ vars.OPERATOR_TEST_USER_ID }}
          OPERATOR_WEBHOOK_SECRET: ${{ secrets.OPERATOR_WEBHOOK_SECRET }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python scripts/operator_smoke_test.py \
            --target "${{ inputs.target }}" \
            --test-run-id "${{ inputs.test_run_id }}" \
            --verify-supabase "${{ inputs.verify_supabase }}"

      - name: Print concise report summary
        if: always()
        run: |
          echo "=== operator_smoke_report.md (first 120 lines) ==="
          sed -n '1,120p' operator_smoke_report.md || true

      - name: Upload smoke reports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: operator-smoke-reports-${{ github.run_id }}
          path: |
            operator_smoke_report.md
            operator_smoke_report.json
          retention-days: 7
